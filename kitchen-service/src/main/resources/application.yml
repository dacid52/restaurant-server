server:
  port: 3004
  address: 127.0.0.1

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: kitchen-service
  datasource:
    url: jdbc:mysql://localhost:3306/kitchendb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

services:
  order: http://localhost:3003

