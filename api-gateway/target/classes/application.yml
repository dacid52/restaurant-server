server:
  port: 3000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      x-forwarded:
        enabled: true
        for-enabled: true
        host-enabled: true
        port-enabled: true
        proto-enabled: true
      globalcors:
        corsConfigurations:
          '[/**]':
            # BUG-029: Giới hạn CORS origin, không dùng wildcard *
            allowedOriginPatterns:
              - "http://localhost:3001"  # Next.js dev server (fallback khi port 3000 bị chiếm)
              - "http://localhost:3010"  # Fe-Admin (recommended port)
              - "http://localhost:3011"  # Customer web + table-service
            allowCredentials: true
            allowedMethods:
            - GET
            - POST
            - PUT
            - DELETE
            - OPTIONS
            allowedHeaders: "*"
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE
        - RemoveRequestHeader=X-Internal-Call
        - RemoveRequestHeader=X-Service-Token
        # Strip Origin trước khi forward đến backend — CORS chỉ do Gateway xử lý.
        # Backend services không cần CORS config, tránh double-block khi truy cập qua LAN IP.
        - RemoveRequestHeader=Origin
      routes:
        - id: user-service
          uri: http://localhost:3005
          predicates:
            - Path=/api/users/**

        - id: user-service-roles
          uri: http://localhost:3005
          predicates:
            - Path=/api/roles/**
        
        - id: menu-service
          uri: http://localhost:3002
          predicates:
            - Path=/api/menu/**

        - id: order-service
          uri: http://localhost:3003
          predicates:
            - Path=/api/orders/**

        - id: table-service
          uri: http://localhost:3011
          predicates:
            - Path=/api/tables/**

        - id: kitchen-service
          uri: http://localhost:3004
          predicates:
            - Path=/api/kitchen/**

        - id: inventory-service
          uri: http://localhost:3006
          predicates:
            - Path=/api/inventory/**

        - id: payment-service
          uri: http://localhost:3008
          predicates:
            - Path=/api/payments/**

        - id: image-service
          uri: http://localhost:3007
          predicates:
            - Path=/api/images/**

        - id: payment-websocket
          uri: http://localhost:3008
          predicates:
            - Path=/ws/payment/**

        - id: kitchen-websocket
          uri: http://localhost:3004
          predicates:
            - Path=/ws/kitchen/**

        - id: order-websocket
          uri: http://localhost:3003
          predicates:
            - Path=/ws/order/**


