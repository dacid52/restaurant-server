server:
  port: 3000

spring:
  cloud:
    gateway:
      default-filters:
        # Deduplicate CORS headers in case a backend service also sets them
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
        - RemoveRequestHeader=X-Internal-Call
        - RemoveRequestHeader=X-Service-Token
        # Strip Origin before forwarding — CORS is handled by Gateway only
        - RemoveRequestHeader=Origin
      globalcors:
        corsConfigurations:
          '[/**]':
            # Local dev: cho phép tất cả origin (localhost + mọi LAN IP)
            # "*" là wildcard đặc biệt của Spring, khác allowedOrigins("*") — hoạt động đúng với allowCredentials: true
            allowedOriginPatterns:
              - "*"
            allowCredentials: true
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
