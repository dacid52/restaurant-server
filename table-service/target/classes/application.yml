server:
  port: 3011

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
    time-zone: Asia/Ho_Chi_Minh
  application:
    name: table-service
  datasource:
    url: jdbc:mysql://localhost:3306/tabledb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jwt:
  secret: ${JWT_SECRET}

app:
  customer-base-url: http://restaurant-server.site:3011
  restaurant:
    name: "Nhà Hàng Restaurant"
    address: "123 Đường Nguyễn Huệ, Quận 1, TP. Hồ Chí Minh"
    phone: "028 1234 5678"
    email: ${MAIL_USERNAME:your-email@gmail.com}

