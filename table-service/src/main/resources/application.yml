server:
  port: 3011

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
  application:
    name: table-service
  datasource:
    url: jdbc:mysql://localhost:3306/tabledb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

app:
  customer-base-url: http://restaurant-server.site:3011

