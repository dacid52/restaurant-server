<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập – Nhà hàng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
</head>
<body class="min-h-screen bg-gray-50">
  <div id="navbar"></div>

  <div class="min-h-[calc(100vh-56px)] flex items-center justify-center px-4 py-10">
    <div class="bg-white rounded-2xl shadow-sm border p-8 w-full max-w-sm">
      <h1 class="text-2xl font-bold text-gray-800 mb-1">Đăng nhập</h1>
      <p class="text-gray-500 text-sm mb-6">
        Chưa có tài khoản?
        <a href="/register/" class="text-orange-600 hover:underline">Đăng ký</a>
      </p>

      <div id="error-box" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm"></div>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email hoặc số điện thoại</label>
          <input id="identifier" type="text" required autocomplete="username"
            placeholder="email@gmail.com hoặc 0909123456"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
          <input id="password" type="password" required autocomplete="current-password"
            placeholder="••••••"
            class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-orange-500" />
        </div>
        <button type="submit" id="btn-submit"
          class="w-full bg-orange-600 text-white font-semibold py-2.5 rounded-lg hover:bg-orange-700 disabled:opacity-60 transition">
          Đăng nhập
        </button>
      </form>
    </div>
  </div>

  <script>
    renderNavbar();

    // Nếu đã đăng nhập thì redirect
    if (isLoggedIn()) {
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('redirect') || '/booking/';
    }

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('btn-submit');
      const errorBox = document.getElementById('error-box');
      errorBox.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Đang đăng nhập...';

      try {
        const data = await apiFetch('/api/users/login', {
          method: 'POST',
          body: JSON.stringify({
            identifier: document.getElementById('identifier').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        saveAuth(data.token, data.user);
        const params = new URLSearchParams(window.location.search);
        window.location.href = params.get('redirect') || '/booking/';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Đăng nhập';
      }
    });
  </script>
</body>
</html>
