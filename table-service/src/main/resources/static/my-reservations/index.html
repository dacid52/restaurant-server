<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đặt bàn của tôi – Nhà hàng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/js/config.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/navbar.js"></script>
</head>
<body class="min-h-screen bg-gray-50">
  <div id="navbar"></div>

  <main class="max-w-3xl mx-auto px-4 py-10">
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Lịch sử</h1>
      <a href="/booking/"
        class="bg-orange-600 text-white text-sm font-semibold px-4 py-2 rounded-lg hover:bg-orange-700 transition">
        + Đặt bàn mới
      </a>
    </div>

    <div id="error-box" class="hidden bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm"></div>
    <div id="loading" class="text-gray-500 text-sm">Đang tải...</div>
    <div id="empty" class="hidden text-center py-16 text-gray-400">
      <div class="text-5xl mb-4">📅</div>
      <p class="font-medium mb-2">Chưa có đặt bàn nào</p>
      <p class="text-sm"><a href="/booking/" class="text-orange-600 hover:underline">Đặt bàn ngay</a> để có trải nghiệm tuyệt vời!</p>
    </div>
    <div id="list" class="hidden space-y-4"></div>
  </main>

  <script>
    requireAuth();
    renderNavbar();

    const STATUS_LABELS = {
      pending: 'Chờ xác nhận',
      confirmed: 'Đã xác nhận',
      serving: 'Đang phục vụ',
      cancelled: 'Đã hủy',
      completed: 'Hoàn thành',
      no_show: 'Không đến',
    };
    const STATUS_COLORS = {
      pending:   'bg-yellow-100 text-yellow-800',
      confirmed: 'bg-green-100 text-green-800',
      serving:   'bg-purple-100 text-purple-800',
      cancelled: 'bg-red-100 text-red-800',
      completed: 'bg-blue-100 text-blue-800',
      no_show:   'bg-gray-100 text-gray-800',
    };

    function escHtml(str) {
      const d = document.createElement('div');
      d.appendChild(document.createTextNode(String(str ?? '')));
      return d.innerHTML;
    }

    function formatDT(s) {
      return new Date(s).toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function canCancel(status) {
      return status === 'pending';
    }

    function isConfirmed(status) {
      return status === 'confirmed';
    }

    async function cancelReservation(id) {
      if (!confirm('Bạn có chắc muốn hủy đơn đặt bàn này không?')) return;
      try {
        await apiFetch(`/api/tables/reservations/${id}/cancel`, { method: 'PUT' });
        // Cập nhật UI ngay lập tức
        const card = document.getElementById('rsv-' + id);
        if (card) {
          card.querySelector('.status-badge').className = 'status-badge text-xs font-semibold px-2.5 py-1 rounded-full whitespace-nowrap bg-red-100 text-red-800';
          card.querySelector('.status-badge').textContent = 'Đã hủy';
          const actions = card.querySelector('.cancel-actions');
          if (actions) actions.remove();
        }
      } catch (err) {
        alert('Không thể hủy đơn: ' + (err.message || 'Lỗi không xác định'));
      }
    }

    function loadReservations() {
      apiFetch('/api/tables/reservations/my')
        .then(data => {
          document.getElementById('loading').classList.add('hidden');
          if (!data || data.length === 0) {
            document.getElementById('empty').classList.remove('hidden');
            return;
          }
          const list = document.getElementById('list');
          list.classList.remove('hidden');
          list.innerHTML = data.map(r => {
            const startFmt = formatDT(r.start_time);
            const endTime = new Date(r.end_time);
            const endHM = endTime.toLocaleString('vi-VN', { timeZone: 'Asia/Ho_Chi_Minh', hour: '2-digit', minute: '2-digit' });
            const statusColor = STATUS_COLORS[r.status] || 'bg-gray-100 text-gray-600';
            const cancelBtn = canCancel(r.status)
              ? `<div class="cancel-actions mt-3 pt-3 border-t border-gray-100">
                   <button onclick="cancelReservation(${r.id})"
                     class="text-sm text-red-600 hover:text-red-800 font-medium hover:underline flex items-center gap-1">
                     ✕ Hủy đặt bàn
                   </button>
                 </div>`
              : isConfirmed(r.status)
              ? `<div class="mt-3 pt-3 border-t border-gray-100">
                   <p class="text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded-md px-3 py-2">
                     ⚠️ Đơn đặt bàn đã được nhà hàng xác nhận, không thể tự hủy.<br>
                     Nếu bạn cần thay đổi, vui lòng liên hệ hotline:
                     <a href="tel:0792967979" class="font-semibold text-amber-800 hover:underline">0792967979</a>
                     để được hỗ trợ.
                   </p>
                 </div>`
              : '';
            return `
              <div id="rsv-${r.id}" class="bg-white border rounded-xl shadow-sm p-5">
                <div class="flex items-start justify-between gap-3">
                  <div class="flex-1">
                    <p class="font-semibold text-gray-800">Bàn #${r.table_id}</p>
                    <div class="mt-2 bg-blue-50 border border-blue-200 rounded-md px-3 py-2">
                      <p class="text-sm font-bold text-blue-900">🕐 Giờ đến: ${escHtml(startFmt)}</p>
                      <p class="text-xs text-blue-600">Dự kiến kết thúc: ${escHtml(endHM)}</p>
                    </div>
                    <p class="text-sm text-gray-500 mt-2">${r.party_size} khách</p>
                    ${r.is_buffet ? '<p class="text-sm text-orange-600 font-medium mt-1">🍽️ Buffet' + (r.buffet_package_name ? ' – ' + escHtml(r.buffet_package_name) : '') + '</p>' : ''}
                    ${r.notes ? `<p class="text-sm text-gray-400 mt-1 italic">"${escHtml(r.notes)}"</p>` : ''}
                    ${cancelBtn}
                  </div>
                  <span class="status-badge text-xs font-semibold px-2.5 py-1 rounded-full whitespace-nowrap ${statusColor}">
                    ${escHtml(STATUS_LABELS[r.status] || r.status)}
                  </span>
                </div>
              </div>`;
          }).join('');
        })
        .catch(err => {
          document.getElementById('loading').classList.add('hidden');
          const eb = document.getElementById('error-box');
          eb.textContent = err.message || 'Không thể tải danh sách đặt bàn';
          eb.classList.remove('hidden');
        });
    }

    loadReservations();
  </script>
</body>
</html>
