spring:
  datasource:
    url: jdbc:mysql://localhost:3306/tabledb?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: ""
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          from: ${MAIL_USERNAME:your-email@gmail.com}
          auth.mechanisms: LOGIN PLAIN
          starttls:
            enable: true
            required: true
